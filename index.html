<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>DJANGO注文管理システム</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1c1917">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="DJANGO注文">
<link rel="apple-touch-icon" href="icon-192.png">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Noto Sans JP', 'Hiragino Sans', sans-serif; background: #f8f7f4; color: #1a1a1a; min-height: 100vh; }

  .header { background: #1c1917; padding: 0 16px; height: 52px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 10; }
  .header-title { color: #fff; font-weight: 700; font-size: 15px; display: flex; align-items: center; gap: 8px; }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: #f59e0b; animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
  .mode-switcher { background: #292524; border-radius: 8px; padding: 4px; display: flex; gap: 4px; }
  .mode-btn { padding: 6px 14px; border-radius: 6px; border: none; cursor: pointer; font-size: 13px; font-weight: 600; font-family: inherit; transition: all 0.15s; }
  .mode-btn.active { background: #f59e0b; color: #1c1917; }
  .mode-btn.inactive { background: transparent; color: #a8a29e; }
  .user-info { color: #a8a29e; font-size: 12px; display: flex; align-items: center; gap: 8px; }
  .logout-btn { background: #292524; color: #a8a29e; border: 1px solid #44403c; padding: 4px 12px; border-radius: 6px; font-size: 12px; cursor: pointer; font-family: inherit; }

  .main { max-width: 700px; margin: 0 auto; padding: 16px; }

  .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 16px; }
  .stat-card { background: #fff; border-radius: 10px; padding: 12px 14px; border: 1px solid #e7e5e4; }
  .stat-label { font-size: 11px; color: #78716c; margin-bottom: 2px; }
  .stat-value { font-size: 26px; font-weight: 700; }

  .btn { padding: 10px 18px; border-radius: 8px; border: none; font-weight: 700; font-size: 14px; cursor: pointer; font-family: inherit; }
  .btn-primary { background: #f59e0b; color: #1c1917; }
  .btn-secondary { background: #fff; color: #1c1917; border: 1px solid #d6d3d1; font-weight: 600; }
  .btn-dark { background: #1c1917; color: #fff; }
  .btn-danger { background: #fee2e2; color: #dc2626; padding: 6px 12px; font-size: 12px; font-weight: 600; border: none; border-radius: 6px; cursor: pointer; font-family: inherit; }
  .btn-green { background: #10b981; color: #fff; padding: 8px 14px; font-size: 13px; font-weight: 700; border: none; border-radius: 6px; cursor: pointer; font-family: inherit; }
  .btn-purple { background: #6366f1; color: #fff; padding: 8px 14px; font-size: 13px; font-weight: 700; border: none; border-radius: 6px; cursor: pointer; font-family: inherit; }

  .action-bar { display: flex; gap: 8px; margin-bottom: 14px; flex-wrap: wrap; align-items: center; }
  .sync-status { font-size: 12px; color: #10b981; margin-left: auto; display: flex; align-items: center; gap: 4px; }
  .sync-dot { width: 6px; height: 6px; border-radius: 50%; background: #10b981; }

  .filters { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 14px; }
  .filter-btn { padding: 5px 12px; border-radius: 20px; border: 1px solid #d6d3d1; cursor: pointer; font-size: 12px; font-family: inherit; background: #fff; color: #78716c; }
  .filter-btn.active { background: #1c1917; color: #fff; border-color: #1c1917; font-weight: 700; }

  .form-card { background: #fff; border-radius: 12px; border: 1px solid #e7e5e4; padding: 16px; margin-bottom: 14px; }
  .form-title { font-weight: 700; font-size: 15px; margin-bottom: 14px; }
  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .form-group label { font-size: 12px; color: #78716c; display: block; margin-bottom: 4px; }
  .form-group input, .form-group textarea { width: 100%; padding: 9px 12px; border: 1px solid #d6d3d1; border-radius: 6px; font-size: 14px; font-family: inherit; outline: none; -webkit-appearance: none; }
  .form-group input:focus, .form-group textarea:focus { border-color: #f59e0b; }
  .form-actions { display: flex; gap: 8px; margin-top: 14px; }

  .order-list { display: flex; flex-direction: column; gap: 8px; }
  .order-card { background: #fff; border-radius: 12px; border: 1px solid #e7e5e4; padding: 14px 16px; border-left: 4px solid; }
  .order-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; }
  .order-info { flex: 1; }
  .order-name { font-weight: 700; font-size: 16px; margin-bottom: 4px; }
  .order-model { font-size: 12px; color: #78716c; background: #f5f5f4; padding: 2px 8px; border-radius: 4px; display: inline-block; margin-left: 6px; }
  .badge { font-size: 12px; padding: 3px 10px; border-radius: 20px; font-weight: 600; display: inline-block; margin-top: 4px; }
  .delivery-date { font-size: 10px; color: #10b981; font-weight: 600; margin-left: 4px; background: #d1fae5; padding: 2px 6px; border-radius: 4px; }
  .order-meta { margin-top: 6px; font-size: 13px; color: #57534e; display: flex; gap: 12px; flex-wrap: wrap; }
  .order-memo { margin-top: 6px; font-size: 13px; color: #78716c; background: #fafaf9; padding: 4px 10px; border-radius: 4px; }
  .order-time { font-size: 11px; color: #a8a29e; margin-top: 4px; }
  .order-actions { display: flex; flex-direction: column; gap: 6px; align-items: flex-end; flex-shrink: 0; }

  .empty { text-align: center; padding: 60px 20px; color: #a8a29e; background: #fff; border-radius: 12px; border: 1px solid #e7e5e4; }
  .empty-icon { font-size: 40px; margin-bottom: 8px; }

  .loading { text-align: center; padding: 60px 20px; color: #a8a29e; }
  .spinner { width: 32px; height: 32px; border: 3px solid #e7e5e4; border-top-color: #f59e0b; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 12px; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); display: flex; align-items: flex-end; justify-content: center; z-index: 100; }
  .modal-overlay.center { align-items: center; padding: 16px; }
  .modal { background: #fff; border-radius: 16px 16px 0 0; width: 100%; max-height: 85vh; overflow-y: auto; padding: 20px; }
  .modal.center { border-radius: 16px; max-width: 540px; }
  .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
  .modal-title { font-weight: 700; font-size: 17px; }
  .modal-close { background: none; border: none; font-size: 22px; cursor: pointer; color: #78716c; padding: 0 4px; }

  .week-select { width: 100%; padding: 9px 12px; border: 1px solid #d6d3d1; border-radius: 6px; font-size: 14px; font-family: inherit; margin-bottom: 14px; }
  .weekly-preview { background: #fafaf9; border-radius: 8px; padding: 14px; font-family: monospace; font-size: 12px; white-space: pre-wrap; margin-bottom: 14px; border: 1px solid #e7e5e4; line-height: 1.8; max-height: 40vh; overflow-y: auto; }
  .modal-actions { display: flex; gap: 10px; }
  .modal-actions .btn { flex: 1; text-align: center; }

  .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: #1c1917; color: #fff; padding: 10px 20px; border-radius: 20px; font-size: 13px; font-weight: 600; z-index: 200; opacity: 0; transition: opacity 0.3s; pointer-events: none; white-space: nowrap; }
  .toast.show { opacity: 1; }

  .login-screen { position: fixed; inset: 0; background: #f8f7f4; display: flex; align-items: center; justify-content: center; z-index: 1000; }
  .login-card { background: #fff; border-radius: 16px; padding: 32px; max-width: 420px; width: 90%; box-shadow: 0 4px 24px rgba(0,0,0,0.08); }
  .login-header { text-align: center; margin-bottom: 32px; }
  .login-header h1 { font-size: 22px; font-weight: 700; margin-bottom: 8px; }
  .login-header p { font-size: 14px; color: #78716c; }
  .login-section { margin-bottom: 24px; padding-bottom: 24px; border-bottom: 1px solid #e7e5e4; }
  .login-section:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
  .login-label { font-size: 13px; color: #78716c; margin-bottom: 10px; font-weight: 600; display: block; }
  .login-input { width: 100%; padding: 10px 14px; border: 1px solid #d6d3d1; border-radius: 8px; font-size: 14px; font-family: inherit; margin-bottom: 10px; }
  .login-btn { width: 100%; padding: 12px; border-radius: 8px; border: none; font-weight: 700; font-size: 14px; cursor: pointer; font-family: inherit; }
  .login-btn-primary { background: #f59e0b; color: #1c1917; }
  .login-btn-secondary { background: #fff; color: #1c1917; border: 1px solid #d6d3d1; }
  .error-msg { color: #dc2626; font-size: 12px; margin-top: 8px; display: none; }

  .date-input-group { margin-bottom: 16px; }
  .date-input-group label { font-size: 13px; color: #78716c; display: block; margin-bottom: 8px; font-weight: 600; }
  .date-input-group input[type="date"] { width: 100%; padding: 10px 14px; border: 1px solid #d6d3d1; border-radius: 8px; font-size: 14px; font-family: inherit; }
</style>
</head>
<body>

<div class="login-screen" id="login-screen">
  <div class="login-card">
    <div class="login-header">
      <h1>DJANGO注文管理システム</h1>
      <p>ログイン方法を選択してください</p>
    </div>

    <div class="login-section">
      <label class="login-label">👤 店舗スタッフ</label>
      <input type="password" class="login-input" id="store-password" placeholder="パスワードを入力">
      <button class="login-btn login-btn-primary" onclick="loginStore()">ログイン</button>
      <div class="error-msg" id="store-error">パスワードが違います</div>
    </div>

    <div class="login-section">
      <label class="login-label">🏢 問屋</label>
      <input type="password" class="login-input" id="wholesaler-password" placeholder="パスワードを入力">
      <button class="login-btn login-btn-primary" onclick="loginWholesaler()">ログイン</button>
      <div class="error-msg" id="wholesaler-error">パスワードが違います</div>
    </div>

    <div class="login-section">
      <label class="login-label">👁️ 閲覧のみ</label>
      <button class="login-btn login-btn-secondary" onclick="loginViewer()">パスワードなしで続ける</button>
    </div>
  </div>
</div>

<div id="main-app" style="display:none">
  <div class="header">
    <div class="header-title">
      <div class="dot"></div>DJANGO注文管理システム
    </div>
    <div style="display:flex;align-items:center;gap:12px">
      <div class="user-info">
        <span id="user-role">閲覧モード</span>
      </div>
      <div class="mode-switcher" id="mode-switcher">
        <button class="mode-btn active" id="btn-store" onclick="setMode('store')">店舗モード</button>
        <button class="mode-btn inactive" id="btn-wholesaler" onclick="setMode('wholesaler')">問屋モード</button>
      </div>
      <button class="logout-btn" onclick="logout()">ログアウト</button>
    </div>
  </div>

  <div class="main">
    <div class="stats">
      <div class="stat-card"><div class="stat-label">全注文</div><div class="stat-value" id="stat-total" style="color:#1c1917">-</div></div>
      <div class="stat-card"><div class="stat-label">未確認</div><div class="stat-value" id="stat-pending" style="color:#f59e0b">-</div></div>
      <div class="stat-card"><div class="stat-label">押さえ済み</div><div class="stat-value" id="stat-reserved" style="color:#10b981">-</div></div>
    </div>

    <div class="action-bar">
      <button class="btn btn-primary" id="add-btn" onclick="toggleForm()" style="display:none">＋ 注文を追加</button>
      <button class="btn btn-secondary" onclick="openWeekly()">📋 2週間リスト</button>
      <div class="sync-status" id="sync-status"><div class="sync-dot"></div>リアルタイム同期中</div>
    </div>

    <div class="filters">
      <button class="filter-btn active" onclick="setFilter('all', this)">すべて</button>
      <button class="filter-btn" onclick="setFilter('pending', this)">未確認</button>
      <button class="filter-btn" onclick="setFilter('reserved', this)">押さえ済み</button>
      <button class="filter-btn" onclick="setFilter('ordered', this)">注文済み</button>
    </div>

    <div class="form-card" id="order-form" style="display:none">
      <div class="form-title">新規注文登録</div>
      <div class="form-grid">
        <div class="form-group">
          <label>商品名 ＊</label>
          <input type="text" id="f-product" placeholder="例：デリア左カウチ">
        </div>
        <div class="form-group">
          <label>カラー</label>
          <input type="text" id="f-model" placeholder="例：CAMやCACAO等">
        </div>
        <div class="form-group">
          <label>数量 ＊</label>
          <input type="text" id="f-qty" placeholder="例：2">
        </div>
        <div class="form-group">
          <label>お客様番号 ＊</label>
          <input type="text" id="f-customer" placeholder="例：358">
        </div>
        <div class="form-group" style="grid-column: span 2">
          <label>備考</label>
          <input type="text" id="f-memo" placeholder="納期指定など">
        </div>
      </div>
      <div class="form-actions">
        <button class="btn btn-dark" onclick="addOrder()">登録する</button>
        <button class="btn btn-secondary" onclick="toggleForm()">キャンセル</button>
      </div>
    </div>

    <div id="order-list">
      <div class="loading"><div class="spinner"></div>接続中...</div>
    </div>
  </div>
</div>

<!-- 入荷予定日入力モーダル -->
<div class="modal-overlay center" id="delivery-date-modal" style="display:none">
  <div class="modal center">
    <div class="modal-header">
      <div class="modal-title">📦 入荷予定日を入力</div>
      <button class="modal-close" onclick="closeDeliveryDateModal()">✕</button>
    </div>
    <div class="date-input-group">
      <label>入荷予定日</label>
      <input type="date" id="delivery-date-input">
    </div>
    <div class="modal-actions">
      <button class="btn btn-dark" onclick="confirmDeliveryDate()">確定</button>
      <button class="btn btn-secondary" onclick="closeDeliveryDateModal()">キャンセル</button>
    </div>
  </div>
</div>

<!-- 週次リストモーダル -->
<div class="modal-overlay center" id="weekly-modal" style="display:none" onclick="closeWeeklyOutside(event)">
  <div class="modal center">
    <div class="modal-header">
      <div class="modal-title">📋 2週間注文リスト</div>
      <button class="modal-close" onclick="closeWeekly()">✕</button>
    </div>
    <label style="font-size:12px;color:#78716c;display:block;margin-bottom:6px">対象期間を選択</label>
    <select class="week-select" id="week-select" onchange="updatePreview()"></select>
    <div class="weekly-preview" id="weekly-preview">期間を選択してください</div>
    <div class="modal-actions">
      <button class="btn btn-dark" id="copy-btn" onclick="copyText()">📋 テキストをコピー</button>
      <button class="btn btn-secondary" onclick="window.print()">🖨️ 印刷</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('service-worker.js')
      .then(reg => console.log('Service Worker registered'))
      .catch(err => console.log('Service Worker registration failed'));
  });
}
</script>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import { getDatabase, ref, onValue, push, update, remove } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyDx6oJnre3L1UWcYzeKFzPjaLo5_E5qZLc",
    authDomain: "django-interior.firebaseapp.com",
    databaseURL: "https://django-interior-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "django-interior",
    storageBucket: "django-interior.firebasestorage.app",
    messagingSenderId: "600675642337",
    appId: "1:600675642337:web:2e420e6553093600f200a0"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);
  const ordersRef = ref(db, 'orders');

  const STATUS = {
    pending:  { label: '未確認',    color: '#f59e0b', bg: '#fef3c7' },
    reserved: { label: '押さえ済み', color: '#10b981', bg: '#d1fae5' },
    ordered:  { label: '注文済み',  color: '#6366f1', bg: '#e0e7ff' },
  };

  const STORE_HASH = 'b6d8a39cad12748e450a36953d0abf9b897e61f6ed92fe4dc12874c84b8aba08';
  const WHOLESALER_HASH = '0aa48abe93d27b8552d1733dd35270414d480ac071279fdfe14b7116ca7e82c3';

  let userRole = null;
  let mode = 'store';
  let orders = {};
  let filterStatus = 'all';
  let formOpen = false;
  let pendingOrderId = null; // 入荷予定日設定待ちの注文ID

  async function sha256(str) {
    const buffer = new TextEncoder().encode(str);
    const hashBuffer = await crypto.subtle.digest('SHA-256', buffer);
    const hashArray = Array.from(new Uint8Array(hashBuffer));
    return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
  }

  window.loginStore = async function() {
    const password = document.getElementById('store-password').value;
    const hash = await sha256(password);
    
    if (hash === STORE_HASH) {
      userRole = 'store';
      sessionStorage.setItem('userRole', 'store');
      showMainApp();
    } else {
      document.getElementById('store-error').style.display = 'block';
      setTimeout(() => {
        document.getElementById('store-error').style.display = 'none';
      }, 3000);
    }
  };

  window.loginWholesaler = async function() {
    const password = document.getElementById('wholesaler-password').value;
    const hash = await sha256(password);
    
    if (hash === WHOLESALER_HASH) {
      userRole = 'wholesaler';
      sessionStorage.setItem('userRole', 'wholesaler');
      showMainApp();
    } else {
      document.getElementById('wholesaler-error').style.display = 'block';
      setTimeout(() => {
        document.getElementById('wholesaler-error').style.display = 'none';
      }, 3000);
    }
  };

  window.loginViewer = function() {
    userRole = 'viewer';
    sessionStorage.setItem('userRole', 'viewer');
    showMainApp();
  };

  window.logout = function() {
    userRole = null;
    sessionStorage.clear();
    document.getElementById('login-screen').style.display = 'flex';
    document.getElementById('main-app').style.display = 'none';
  };

  function showMainApp() {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('main-app').style.display = 'block';
    updateUIForRole();
    
    if (userRole === 'wholesaler') {
      setMode('wholesaler');
    } else {
      setMode('store');
    }
  }

  function updateUIForRole() {
    const roleLabel = document.getElementById('user-role');
    const modeSwitcher = document.getElementById('mode-switcher');
    
    if (userRole === 'store') {
      roleLabel.textContent = '店舗スタッフ';
      modeSwitcher.style.display = 'none';
      mode = 'store';
    } else if (userRole === 'wholesaler') {
      roleLabel.textContent = '問屋';
      modeSwitcher.style.display = 'none';
      mode = 'wholesaler';
    } else if (userRole === 'viewer') {
      roleLabel.textContent = '閲覧モード';
      modeSwitcher.style.display = 'flex';
    }
  }

  const savedRole = sessionStorage.getItem('userRole');
  if (savedRole) {
    userRole = savedRole;
    showMainApp();
  }

  onValue(ordersRef, (snapshot) => {
    orders = snapshot.val() || {};
    render();
    document.getElementById('sync-status').innerHTML = '<div class="sync-dot"></div>リアルタイム同期中';
  }, (error) => {
    document.getElementById('sync-status').innerHTML = '<span style="color:#ef4444">⚠ 接続エラー</span>';
  });

  window.setMode = function(m) {
    if (userRole === 'store' && m !== 'store') return;
    if (userRole === 'wholesaler' && m !== 'wholesaler') return;
    
    mode = m;
    document.getElementById('btn-store').className = 'mode-btn ' + (m === 'store' ? 'active' : 'inactive');
    document.getElementById('btn-wholesaler').className = 'mode-btn ' + (m === 'wholesaler' ? 'active' : 'inactive');
    
    const addBtn = document.getElementById('add-btn');
    addBtn.style.display = (userRole === 'store' && m === 'store') ? '' : 'none';
    
    if (formOpen && m !== 'store') window.toggleForm();
    render();
  };

  window.setFilter = function(s, btn) {
    filterStatus = s;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    render();
  };

  window.toggleForm = function() {
    if (userRole === 'viewer') return;
    formOpen = !formOpen;
    document.getElementById('order-form').style.display = formOpen ? '' : 'none';
    if (!formOpen) clearForm();
  };

  function clearForm() {
    ['f-product','f-model','f-qty','f-customer','f-memo'].forEach(id => document.getElementById(id).value = '');
  }

  window.addOrder = async function() {
    if (userRole === 'viewer') return;
    const product  = document.getElementById('f-product').value.trim();
    const model    = document.getElementById('f-model').value.trim();
    const qty      = document.getElementById('f-qty').value.trim();
    const customer = document.getElementById('f-customer').value.trim();
    const memo     = document.getElementById('f-memo').value.trim();
    if (!product || !qty || !customer) { showToast('⚠ 商品名・数量・お客様番号は必須です'); return; }
    await push(ordersRef, {
      productName: product,
      modelNumber: model,
      quantity: qty,
      customerName: customer,
      memo,
      status: 'pending',
      createdAt: new Date().toISOString()
    });
    showToast('✓ 注文を登録しました');
    window.toggleForm();
  };

  // 入荷予定日入力モーダルを開く
  window.openDeliveryDateModal = function(orderId) {
    pendingOrderId = orderId;
    const today = new Date().toISOString().split('T')[0];
    document.getElementById('delivery-date-input').value = today;
    document.getElementById('delivery-date-modal').style.display = '';
  };

  // 入荷予定日入力モーダルを閉じる
  window.closeDeliveryDateModal = function() {
    pendingOrderId = null;
    document.getElementById('delivery-date-modal').style.display = 'none';
  };

  // 入荷予定日を確定
  window.confirmDeliveryDate = async function() {
    const deliveryDate = document.getElementById('delivery-date-input').value;
    if (!deliveryDate) {
      showToast('⚠ 入荷予定日を選択してください');
      return;
    }
    if (pendingOrderId) {
      await update(ref(db, 'orders/' + pendingOrderId), { 
        status: 'reserved',
        deliveryDate: deliveryDate
      });
      showToast('✓ 「押さえ済み」に更新しました');
      closeDeliveryDateModal();
    }
  };

  window.updateStatus = async function(id, status) {
    if (userRole === 'viewer') return;
    
    // 問屋が「押さえ済み」にする場合は入荷予定日を入力
    if (status === 'reserved' && userRole === 'wholesaler') {
      openDeliveryDateModal(id);
      return;
    }
    
    // それ以外は通常の更新
    await update(ref(db, 'orders/' + id), { status });
    const label = STATUS[status]?.label || status;
    showToast(`✓ 「${label}」に更新しました`);
  };

  window.deleteOrder = async function(id) {
    if (userRole === 'viewer') return;
    if (!confirm('この注文を削除しますか？')) return;
    await remove(ref(db, 'orders/' + id));
    showToast('削除しました');
  };

  function fmtDT(iso) {
    const d = new Date(iso);
    return `${d.getMonth()+1}/${d.getDate()} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
  }

  function fmtDate(dateStr) {
    if (!dateStr) return '';
    const d = new Date(dateStr);
    return `${d.getMonth()+1}/${d.getDate()}`;
  }

  function render() {
    const arr = Object.entries(orders).map(([id, o]) => ({ id, ...o }))
      .sort((a,b) => new Date(b.createdAt) - new Date(a.createdAt));

    document.getElementById('stat-total').textContent   = arr.length;
    document.getElementById('stat-pending').textContent  = arr.filter(o => o.status === 'pending').length;
    document.getElementById('stat-reserved').textContent = arr.filter(o => o.status === 'reserved').length;

    const filtered = filterStatus === 'all' ? arr : arr.filter(o => o.status === filterStatus);
    const list = document.getElementById('order-list');

    if (filtered.length === 0) {
      list.innerHTML = `<div class="empty"><div class="empty-icon">📦</div><div>注文がありません</div></div>`;
      return;
    }

    list.innerHTML = filtered.map(o => {
      const s = STATUS[o.status];
      let actionBtns = '';
      
      if (userRole === 'viewer') {
        actionBtns = '';
      } else if (mode === 'wholesaler' && o.status === 'pending' && userRole === 'wholesaler') {
        actionBtns = `<button class="btn-green" onclick="updateStatus('${o.id}','reserved')">押さえ済みにする</button>`;
      } else if (mode === 'wholesaler' && o.status === 'reserved') {
        actionBtns = `<span style="font-size:11px;color:#10b981">✓ 対応済み</span>`;
      } else if (mode === 'store' && o.status === 'reserved' && userRole === 'store') {
        actionBtns = `<button class="btn-purple" onclick="updateStatus('${o.id}','ordered')">注文済みにする</button>`;
      }

      const deleteBtn = (mode === 'store' && userRole === 'store')
        ? `<button class="btn-danger" onclick="deleteOrder('${o.id}')">削除</button>` : '';

      // 入荷予定日表示
      const deliveryDateBadge = o.deliveryDate 
        ? `<span class="delivery-date">${fmtDate(o.deliveryDate)}入荷</span>` 
        : '';

      return `
        <div class="order-card" style="border-left-color:${s.color}">
          <div class="order-top">
            <div class="order-info">
              <div class="order-name">${esc(o.productName)}${o.modelNumber ? `<span class="order-model">${esc(o.modelNumber)}</span>` : ''}</div>
              <span class="badge" style="background:${s.bg};color:${s.color}">${s.label}</span>${deliveryDateBadge}
              <div class="order-meta">
                <span>数量: <strong>${esc(o.quantity)}</strong></span>
                <span>お客様: <strong>${esc(o.customerName)}</strong></span>
              </div>
              ${o.memo ? `<div class="order-memo">備考: ${esc(o.memo)}</div>` : ''}
              <div class="order-time">登録: ${fmtDT(o.createdAt)}</div>
            </div>
            <div class="order-actions">
              ${actionBtns}
              ${deleteBtn}
            </div>
          </div>
        </div>`;
    }).join('');
  }

  function esc(s) {
    return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function getWeekKey(iso) {
    const d = new Date(iso);
    const jstDate = new Date(d.getTime() + (9 * 60 * 60 * 1000));
    const base = new Date('2026-01-02T00:00:00Z');
    const diffMs = jstDate.getTime() - base.getTime();
    const diffDays = Math.floor(diffMs / (1000 * 60 * 60 * 24));
    const periodNumber = Math.floor(diffDays / 14);
    const periodStartTime = base.getTime() + (periodNumber * 14 * 24 * 60 * 60 * 1000);
    return new Date(periodStartTime).toISOString().slice(0, 10);
  }

  function getWeekLabel(wk) {
    const d = new Date(wk + "T00:00:00Z");
    const end = new Date(d);
    end.setUTCDate(d.getUTCDate() + 13);
    return `${d.getUTCMonth()+1}/${d.getUTCDate()}（木）〜 ${end.getUTCMonth()+1}/${end.getUTCDate()}（水）`;
  }

  window.openWeekly = function() {
    const arr = Object.values(orders);
    const weeks = [...new Set(arr.map(o => getWeekKey(o.createdAt)))].sort().reverse();
    if (weeks.length === 0) weeks.push(getWeekKey(new Date().toISOString()));
    const sel = document.getElementById('week-select');
    sel.innerHTML = weeks.map(w => `<option value="${w}">${getWeekLabel(w)}</option>`).join('');
    window.updatePreview();
    document.getElementById('weekly-modal').style.display = '';
  };

  window.closeWeekly = function() { document.getElementById('weekly-modal').style.display = 'none'; };
  window.closeWeeklyOutside = function(e) { if (e.target.id === 'weekly-modal') window.closeWeekly(); };

  window.updatePreview = function() {
    const wk = document.getElementById('week-select').value;
    document.getElementById('weekly-preview').textContent = wk ? generateText(wk) : '期間を選択してください';
  };

  function generateText(wk) {
    const arr = Object.values(orders).filter(o => getWeekKey(o.createdAt) === wk)
      .sort((a,b) => new Date(a.createdAt) - new Date(b.createdAt));
    const now = new Date();
    const lines = [
      `【2週間注文リスト】`,
      `対象期間: ${getWeekLabel(wk)}`,
      `作成日時: ${now.getFullYear()}年${now.getMonth()+1}月${now.getDate()}日`,
      '─'.repeat(36), ''
    ];
    arr.forEach((o, i) => {
      lines.push(`${i+1}. ${o.productName}${o.modelNumber ? `（${o.modelNumber}）` : ''}`);
      lines.push(`   数量: ${o.quantity}　お客様: ${o.customerName}`);
      if (o.deliveryDate) lines.push(`   入荷予定: ${fmtDate(o.deliveryDate)}`);
      if (o.memo) lines.push(`   備考: ${o.memo}`);
      lines.push(`   ステータス: ${STATUS[o.status]?.label || o.status}`);
      lines.push('');
    });
    lines.push('─'.repeat(36));
    lines.push(`合計 ${arr.length} 件`);
    return lines.join('\n');
  }

  window.copyText = function() {
    const wk = document.getElementById('week-select').value;
    if (!wk) return;
    const text = generateText(wk);
    navigator.clipboard.writeText(text).catch(() => {
      const ta = document.createElement('textarea');
      ta.value = text;
      document.body.appendChild(ta); ta.select();
      document.execCommand('copy');
      document.body.removeChild(ta);
    });
    const btn = document.getElementById('copy-btn');
    btn.textContent = '✓ コピー完了！';
    setTimeout(() => btn.textContent = '📋 テキストをコピー', 2000);
    showToast('✓ クリップボードにコピーしました');
  };

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2500);
  }
</script>
</body>
</html>
